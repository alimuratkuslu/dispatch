name: Release

on:
  push:
    tags:
      - 'v*'

# Grant permission to create a release and upload assets
permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Secrets.swift
        # Secrets.swift is gitignored. We generate it at build time from
        # a GitHub Actions secret. Go to your repo → Settings → Secrets → Actions
        # and add a secret named GITHUB_CLIENT_ID with your OAuth App client ID.
        run: |
          mkdir -p Dispatch/App
          cat > Dispatch/App/Secrets.swift << 'EOF'
          import Foundation
          enum Secrets {
              static let githubClientID = "${{ secrets.GITHUB_CLIENT_ID }}"
          }
          EOF

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          xcodebuild \
            -scheme Dispatch \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create Archive
        run: |
          mkdir -p dist
          # Find the app and copy it to a clean distribution folder
          APP_PATH=$(find DerivedData -name "Dispatch.app" -type d -path "*/Build/Products/Release/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Dispatch.app not found in Release build products!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" dist/
          cd dist
          zip -r ../Dispatch.zip Dispatch.app
          cd ..
          ls -lh Dispatch.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dispatch.zip
          draft: false
          prerelease: false
          body: |
            ## ${{ github.ref_name }}

            Dispatch is a native macOS menu bar app to monitor GitHub pull requests.

            ### Installation
            1. Download `Dispatch.zip`
            2. Extract and move `Dispatch.app` to your Applications folder
            3. Launch and connect your GitHub account through the setup flow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
