name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Secrets.swift
        run: |
          mkdir -p Dispatch/App
          cat > Dispatch/App/Secrets.swift << 'EOF'
          import Foundation
          enum Secrets {
              static let githubClientID = "${{ secrets.DISPATCH_CLIENT_ID }}"
          }
          EOF

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          xcodebuild \
            -scheme Dispatch \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Create Archive
        run: |
          mkdir -p dist
          APP_PATH=$(find DerivedData -name "Dispatch.app" -type d -path "*/Build/Products/Release/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Dispatch.app not found in Release build products!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" dist/
          cd dist
          zip -r ../Dispatch.zip Dispatch.app
          cd ..
          ls -lh Dispatch.zip
          echo "SHA256=$(shasum -a 256 Dispatch.zip | awk '{print $1}')" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: Dispatch.zip
          draft: false
          prerelease: false
          body: |
            ## ${{ github.ref_name }}

            Dispatch is a native macOS menu bar app to monitor GitHub pull requests.

            ### Installation
            1. Download `Dispatch.zip`
            2. Extract and move `Dispatch.app` to your Applications folder
            3. Launch and connect your GitHub account through the setup flow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        # This step automates the update of your homebrew-tap repository.
        # It requires a Personal Access Token (PAT) with 'repo' scope
        # stored as a Secret named HOMEBREW_TAP_TOKEN in this repository.
        if: success()
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA256=${{ env.SHA256 }}
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone the tap repository
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ github.repository_owner }}/homebrew-tap.git tap
          cd tap
          
          # Update the formula
          # We assume the file is at Casks/dispatch.rb
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/dispatch.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/dispatch.rb
          
          # Commit and push
          git add Casks/dispatch.rb
          git commit -m "Update Dispatch to v$VERSION"
          git push origin main
